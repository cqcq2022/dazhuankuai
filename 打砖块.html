<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 4px;
        }

        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2rem;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-item span {
            color: #e94560;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3),
                        inset 0 0 30px rgba(0, 0, 0, 0.3);
            cursor: none;
        }

        .controls {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #e94560;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.4);
        }

        .modal-content h2 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .start-screen h2 {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <h1>🎮 打砖块</h1>
    
    <div class="game-info">
        <div class="info-item">得分: <span id="score">0</span></div>
        <div class="info-item">生命: <span id="lives">3</span></div>
        <div class="info-item">关卡: <span id="level">1</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controls">
        🖱️ 鼠标移动控制挡板 | 点击开始游戏
    </div>

    <div class="start-screen" id="startScreen">
        <h2>点击任意位置开始游戏</h2>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const startScreen = document.getElementById('startScreen');
        const modalTitle = document.getElementById('modalTitle');

        const paddle = {
            width: 120,
            height: 15,
            x: canvas.width / 2 - 60,
            y: canvas.height - 30,
            speed: 8,
            color: '#e94560'
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 10,
            speed: 5,
            dx: 4,
            dy: -4,
            color: '#fff'
        };

        const brickConfig = {
            rowCount: 5,
            colCount: 10,
            padding: 10,
            offsetTop: 50,
            offsetLeft: 35,
            width: 65,
            height: 20
        };

        let bricks = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let animationId;

        const colors = ['#e94560', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#9b59b6'];

        function initBricks() {
            bricks = [];
            for (let r = 0; r < brickConfig.rowCount; r++) {
                bricks[r] = [];
                for (let c = 0; c < brickConfig.colCount; c++) {
                    bricks[r][c] = {
                        x: 0,
                        y: 0,
                        status: 1,
                        color: colors[r % colors.length]
                    };
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.shadowColor = ball.color;
            ctx.shadowBlur = 15;
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = paddle.color;
            ctx.fill();
            ctx.shadowColor = paddle.color;
            ctx.shadowBlur = 20;
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            for (let r = 0; r < brickConfig.rowCount; r++) {
                for (let c = 0; c < brickConfig.colCount; c++) {
                    if (bricks[r][c].status === 1) {
                        const brickX = (c * (brickConfig.width + brickConfig.padding)) + brickConfig.offsetLeft;
                        const brickY = (r * (brickConfig.height + brickConfig.padding)) + brickConfig.offsetTop;
                        bricks[r][c].x = brickX;
                        bricks[r][c].y = brickY;

                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickConfig.width, brickConfig.height, 4);
                        ctx.fillStyle = bricks[r][c].color;
                        ctx.fill();
                        ctx.shadowColor = bricks[r][c].color;
                        ctx.shadowBlur = 10;
                        ctx.closePath();
                        ctx.shadowBlur = 0;

                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(brickX + 5, brickY + 3, brickConfig.width - 10, 3);
                    }
                }
            }
        }

        function collisionDetection() {
            for (let r = 0; r < brickConfig.rowCount; r++) {
                for (let c = 0; c < brickConfig.colCount; c++) {
                    const b = bricks[r][c];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brickConfig.width &&
                            ball.y > b.y && ball.y < b.y + brickConfig.height) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10;
                            scoreEl.textContent = score;

                            if (score % 100 === 0 && ball.speed < 10) {
                                ball.speed += 0.5;
                            }

                            if (checkWin()) {
                                level++;
                                levelEl.textContent = level;
                                if (level > 1) {
                                    ball.speed += 1;
                                }
                                initBricks();
                                resetBall();
                            }
                        }
                    }
                }
            }
        }

        function checkWin() {
            for (let r = 0; r < brickConfig.rowCount; r++) {
                for (let c = 0; c < brickConfig.colCount; c++) {
                    if (bricks[r][c].status === 1) {
                        return false;
                    }
                }
            }
            return true;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
            paddle.x = canvas.width / 2 - paddle.width / 2;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }

            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            } else if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    const hitPoint = (ball.x - paddle.x) / paddle.width;
                    const angle = (hitPoint - 0.5) * Math.PI / 3;
                    ball.dx = ball.speed * Math.sin(angle);
                    ball.dy = -ball.speed * Math.cos(angle);
                } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                    lives--;
                    livesEl.textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver();
                        return;
                    } else {
                        resetBall();
                    }
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (gameRunning) {
                animationId = requestAnimationFrame(draw);
            }
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            modalTitle.textContent = '游戏结束';
            finalScoreEl.textContent = score;
            gameOverModal.classList.add('show');
        }

        function gameWin() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            modalTitle.textContent = '恭喜过关！';
            finalScoreEl.textContent = score;
            gameOverModal.classList.add('show');
        }

        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                startScreen.classList.add('hidden');
                initBricks();
                resetBall();
                draw();
            }
        }

        function restartGame() {
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = 5;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            levelEl.textContent = level;
            gameOverModal.classList.remove('show');
            gameRunning = true;
            initBricks();
            resetBall();
            draw();
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        });

        canvas.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        initBricks();
        drawBricks();
        drawBall();
        drawPaddle();
    </script>
</body>
</html>
